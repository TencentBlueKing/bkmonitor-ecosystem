receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
processors:
extensions:
  health_check: {}
exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  prometheus:
    endpoint: 0.0.0.0:9090
    namespace: helloworld
  opensearch:
    logs_index: "otel"
    http:
      endpoint: "http://opensearch:9200"
  debug:
    verbosity: detailed

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: []
      exporters: [otlp/jaeger, otlp/tempo, debug]

    metrics:
      receivers: [otlp]
      processors: []
      exporters: [prometheus, debug]

    logs:
      receivers: [otlp]
      processors: []
      exporters: [opensearch, debug]
